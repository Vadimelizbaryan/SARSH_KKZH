name: Deploy Supabase Function

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/sharsh-sync/**"
      - "supabase/config.toml"
  workflow_dispatch:

jobs:
  deploy-sharsh-sync:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ywecvlapdlaojpvijaqy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure access token is configured
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "SUPABASE_ACCESS_TOKEN secret is not configured for this repository." >&2
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: v2.98.2

      - name: Deploy sharsh-sync
        run: supabase functions deploy sharsh-sync --project-ref "$SUPABASE_PROJECT_REF"
