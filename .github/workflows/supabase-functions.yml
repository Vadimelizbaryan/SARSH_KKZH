name: Deploy Supabase Function

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/sharsh-sync/**"
      - "supabase/functions/Mainflow-telegram/**"
      - "supabase/config.toml"
      - ".github/workflows/supabase-functions.yml"
  workflow_dispatch:

jobs:
  deploy-supabase-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ywecvlapdlaojpvijaqy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Supabase token is missing
        if: env.SUPABASE_ACCESS_TOKEN == ''
        run: |
          echo "SUPABASE_ACCESS_TOKEN secret is not configured for this repository."

      - name: Setup Node.js
        if: env.SUPABASE_ACCESS_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Supabase CLI
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: npm install --global supabase@latest

      - name: Verify Supabase CLI
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: supabase --version

      - name: Deploy sharsh-sync
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: supabase functions deploy sharsh-sync --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy Mainflow-telegram
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: supabase functions deploy Mainflow-telegram --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt
