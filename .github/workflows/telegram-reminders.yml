name: Telegram reminders

on:
  schedule:
    # GitHub schedules are UTC. Armenia/Yerevan is UTC+4.
    # Avoid minute 00 because GitHub scheduled workflows are often delayed there.
    - cron: "1 3 * * *"   # 07:01 Yerevan: night-shift summary
    - cron: "31 3 * * *"  # 07:31 Yerevan: night-duty reminder
    - cron: "1 4 * * *"   # 08:01 Yerevan: morning PDFs
    - cron: "1 6 * * *"   # 10:01 Yerevan: save daily main archive PDF + cleanup source data
    - cron: "1 8 * * *"   # 12:01 Yerevan: midday reminder
    - cron: "1 13 * * *"  # 17:01 Yerevan: evening reminder
  workflow_dispatch:
    inputs:
      slot:
        description: Reminder slot
        required: true
        type: choice
        options:
          - night-summary
          - night-duty
          - morning-pdfs
          - daily-main-archive
          - midday
          - evening
      force:
        description: Send even if this slot was already sent today
        required: false
        default: false
        type: boolean

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    env:
      FUNCTION_URL: https://ywecvlapdlaojpvijaqy.functions.supabase.co/Mainflow-telegram
      TELEGRAM_REMINDER_SECRET: ${{ secrets.TELEGRAM_REMINDER_SECRET }}
    steps:
      - name: Pick reminder slot
        id: params
        shell: bash
        run: |
          slot="${{ github.event.inputs.slot }}"
          force="${{ github.event.inputs.force }}"
          action="daily-reminder"

          if [ -z "$slot" ]; then
            case "${{ github.event.schedule }}" in
              "1 3 * * *")
                slot="night-summary"
                action="night-shift-summary"
                ;;
              "31 3 * * *")
                slot="night-duty"
                action="night-duty-reminder"
                ;;
              "1 4 * * *")
                slot="morning-pdfs"
                action="send-main-pdfs"
                ;;
              "1 6 * * *")
                slot="daily-main-archive"
                action="daily-main-archive"
                ;;
              "1 8 * * *")
                slot="midday"
                ;;
              "1 13 * * *")
                slot="evening"
                ;;
              *)
                slot="midday"
                ;;
            esac
          fi

          if [ -z "$force" ]; then
            force="false"
          fi

          if [ "$slot" = "morning-pdfs" ]; then
            action="send-main-pdfs"
          fi
          if [ "$slot" = "night-duty" ]; then
            action="night-duty-reminder"
          fi
          if [ "$slot" = "night-summary" ]; then
            action="night-shift-summary"
          fi
          if [ "$slot" = "daily-main-archive" ]; then
            action="daily-main-archive"
          fi

          echo "action=$action" >> "$GITHUB_OUTPUT"
          echo "slot=$slot" >> "$GITHUB_OUTPUT"
          echo "force=$force" >> "$GITHUB_OUTPUT"

      - name: Send Telegram job
        shell: bash
        run: |
          if [ "${{ steps.params.outputs.action }}" = "send-main-pdfs" ]; then
            url="$FUNCTION_URL?action=send-main-pdfs"
          elif [ "${{ steps.params.outputs.action }}" = "night-duty-reminder" ]; then
            url="$FUNCTION_URL?action=night-duty-reminder"
          elif [ "${{ steps.params.outputs.action }}" = "night-shift-summary" ]; then
            url="$FUNCTION_URL?action=night-shift-summary"
          elif [ "${{ steps.params.outputs.action }}" = "daily-main-archive" ]; then
            url="$FUNCTION_URL?action=daily-main-archive"
          else
            url="$FUNCTION_URL?action=daily-reminder&slot=${{ steps.params.outputs.slot }}"
          fi

          if [ "${{ steps.params.outputs.force }}" = "true" ]; then
            url="$url&force=1"
          fi

          if [ -n "$TELEGRAM_REMINDER_SECRET" ]; then
            curl -fsS -H "x-telegram-reminder-secret: $TELEGRAM_REMINDER_SECRET" "$url"
          else
            curl -fsS "$url"
          fi
